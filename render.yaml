services:
  - type: web
    name: stock-analyzer-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
